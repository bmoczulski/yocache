<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-label="Alice and Bob both run bitbake core-image-minimal. Alice shares her downloads and sstate-cache with the YoCache server; Bob fetches Alice's downloads and sstate-cache from it.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7c6ff0"/>
    </marker>
  </defs>

  <!-- ===== Server (YoCache) ===== -->
  <g stroke="#7d8590" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="330" y="30" width="240" height="170" rx="16"/>
    <rect x="355" y="55" width="190" height="32" rx="8"/>
    <rect x="355" y="99" width="190" height="32" rx="8"/>
    <rect x="355" y="143" width="190" height="32" rx="8"/>
    <line x1="370" y1="71" x2="410" y2="71"/>
    <line x1="370" y1="115" x2="410" y2="115"/>
    <line x1="370" y1="159" x2="410" y2="159"/>
  </g>
  <g fill="#7c6ff0" stroke="none">
    <circle cx="524" cy="71" r="5"/>
    <circle cx="524" cy="115" r="5"/>
    <circle cx="524" cy="159" r="5"/>
  </g>
  <text x="450" y="243" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#7d8590">YoCache</text>

  <!-- ===== Alice (left) ===== -->
  <g stroke="#7d8590" stroke-width="3.5" fill="none" stroke-linecap="round">
    <circle cx="185" cy="315" r="28"/>
    <path d="M135 405 a50 50 0 0 1 100 0"/>
  </g>
  <text x="185" y="434" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#7d8590">Alice</text>
  <!-- Alice's terminal -->
  <g stroke="#7d8590" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="20" y="444" width="330" height="100" rx="12"/>
    <line x1="20" y1="476" x2="350" y2="476"/>
  </g>
  <g fill="#7d8590" stroke="none">
    <circle cx="44" cy="460" r="5.5"/>
    <circle cx="64" cy="460" r="5.5"/>
    <circle cx="84" cy="460" r="5.5"/>
  </g>
  <text x="217" y="466" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" font-weight="600" fill="#7d8590">alice@dev</text>
  <text x="38" y="517" font-family="ui-monospace, monospace" font-size="17" font-weight="600" fill="#7d8590">$ bitbake core-image-minimal</text>

  <!-- ===== Bob (right) ===== -->
  <g stroke="#7d8590" stroke-width="3.5" fill="none" stroke-linecap="round">
    <circle cx="715" cy="315" r="28"/>
    <path d="M665 405 a50 50 0 0 1 100 0"/>
  </g>
  <text x="715" y="434" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#7d8590">Bob</text>
  <!-- Bob's terminal -->
  <g stroke="#7d8590" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="550" y="444" width="330" height="100" rx="12"/>
    <line x1="550" y1="476" x2="880" y2="476"/>
  </g>
  <g fill="#7d8590" stroke="none">
    <circle cx="574" cy="460" r="5.5"/>
    <circle cx="594" cy="460" r="5.5"/>
    <circle cx="614" cy="460" r="5.5"/>
  </g>
  <text x="747" y="466" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" font-weight="600" fill="#7d8590">bob@laptop</text>
  <text x="568" y="517" font-family="ui-monospace, monospace" font-size="17" font-weight="600" fill="#7d8590">$ bitbake core-image-minimal</text>

  <!-- ===== Alice <-> server (bi-directional) ===== -->
  <path d="M 228 292 C 272 240, 282 205, 320 162" fill="none" stroke="#7c6ff0" stroke-width="3.5" stroke-linecap="round" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <!-- package beside the arrow -->
  <g stroke="#7c6ff0" stroke-width="3.5" fill="none" stroke-linejoin="round">
    <rect x="196" y="176" width="46" height="46" rx="7"/>
    <line x1="196" y1="193" x2="242" y2="193"/>
    <line x1="219" y1="176" x2="219" y2="193"/>
  </g>
  <text x="200" y="122" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#7c6ff0">share downloads</text>
  <text x="200" y="148" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#7c6ff0">+ sstate-cache</text>

  <!-- ===== Server <-> Bob (bi-directional) ===== -->
  <path d="M 580 162 C 618 205, 628 240, 672 292" fill="none" stroke="#7c6ff0" stroke-width="3.5" stroke-linecap="round" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <!-- lightning bolt beside the arrow: instant -->
  <path d="M672 172 l-24 39 h16 l-10 39 l31 -45 h-16 l13 -33 z" fill="#f5a623" stroke="none"/>
  <text x="700" y="122" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#7c6ff0">fetch Alice's downloads</text>
  <text x="700" y="148" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" fill="#7c6ff0">+ sstate-cache</text>
</svg>
