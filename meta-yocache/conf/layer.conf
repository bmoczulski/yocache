# yocache build-side integration layer.
#
# Classes-only for now (classes/yocache.bbclass). No recipes; the BBFILES
# globs are kept standard so dropping a recipe in later just works.

BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

# Make lib/yocache/ importable (the `yocache` namespace). The artifact uploader
# lives there as a real module so its running-thread handle persists in
# sys.modules across the separate BuildStarted/BuildCompleted handler calls in
# the cooker — inline bbclass-python globals are not guaranteed to.
addpylib ${LAYERDIR}/lib yocache

BBFILE_COLLECTIONS += "yocache"
BBFILE_PATTERN_yocache = "^${LAYERDIR}/"
BBFILE_PRIORITY_yocache = "6"

LAYERVERSION_yocache = "1"
LAYERDEPENDS_yocache = "core"
# Must intersect oe-core's LAYERSERIES_CORENAMES (currently "wrynose"),
# else bitbake rejects the layer as incompatible.
LAYERSERIES_COMPAT_yocache = "wrynose"
