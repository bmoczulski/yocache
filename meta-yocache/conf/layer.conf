# yocache build-side integration layer.
#
# Classes-only for now (classes/yocache.bbclass). No recipes; the BBFILES
# globs are kept standard so dropping a recipe in later just works.

BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

# Make lib/yocache/ importable (the `yocache` namespace). The artifact uploader
# lives there as a real module so its running-thread handle persists in
# sys.modules across the separate BuildStarted/BuildCompleted handler calls in
# the cooker — inline bbclass-python globals are not guaranteed to.
#
# `addpylib` only exists in bitbake's conf parser from poky scarthgap/5.0 on
# (where base.bbclass stopped auto-adding layer lib/ dirs to sys.path). On
# pre-2.x bitbake (e.g. dunfell, bb 1.46) the bare directive is an "unparsed
# line" that aborts the parse — but there base.bbclass's oe_import() still
# prepends every BBPATH layer's lib/ to sys.path, so the bbclass's explicit
# `from yocache import ...` resolves without it. Feature-detect the directive
# (the supporting parser defines __addpylib_regexp__) and pull it in only where
# it exists; `include` is non-fatal on a missing file, so the else branch is a
# silent no-op.
include ${@'addpylib.inc' if hasattr(bb.parse.parse_py.ConfHandler, '__addpylib_regexp__') else 'noop.inc'}

BBFILE_COLLECTIONS += "yocache"
BBFILE_PATTERN_yocache = "^${LAYERDIR}/"
BBFILE_PRIORITY_yocache = "6"

LAYERVERSION_yocache = "1"
LAYERDEPENDS_yocache = "core"
# Must intersect oe-core's LAYERSERIES_CORENAMES, else bitbake rejects the layer
# as incompatible. wrynose = the poky 6.0 this layer was authored against;
# later tested agains dunfell (bb 1.46) too, more might follow here
LAYERSERIES_COMPAT_yocache = "dunfell wrynose"
